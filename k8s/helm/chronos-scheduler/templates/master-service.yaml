apiVersion: v1
kind: Service
metadata:
  name: {{ include "chronos.fullname" . }}-master
  labels:
    {{- include "chronos.labels" . | nindent 4 }}
    app.kubernetes.io/component: master
spec:
  type: {{ .Values.service.master.type }}
  ports:
    - port: {{ .Values.service.master.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "chronos.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: master
